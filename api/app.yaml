spec:
  name: caregap-api
  region: nyc
  services:
    - name: api
      source_dir: /api
      github:
        repo: adipatel0821/caregap
        branch: master
        deploy_on_push: true
      build_command: pip install -r requirements.txt
      run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080
      environment_slug: python
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-0.5gb
      http_port: 8080
      routes:
        - path: /
      envs:
        - key: ANTHROPIC_API_KEY
          scope: RUN_TIME
          type: SECRET
        - key: TAVILY_API_KEY
          scope: RUN_TIME
          type: SECRET
